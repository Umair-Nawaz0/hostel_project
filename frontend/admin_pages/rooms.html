<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rooms</title>

<link rel="stylesheet" href="../css/admin_css/rooms.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>

<div class="hamburger" id="hamburger">☰</div>
<div class="overlay" id="overlay"></div>

<div class="dashboard">

<aside class="sidebar" id="sidebar">
    <h2>Hostel Admin</h2>
    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="students.html">Students</a></li>
        <li class="active"><a href="rooms.html">Rooms</a></li>
        <li><a href="allocations.html">Allocations</a></li>
        <li><a href="payments.html">Payments</a></li>
        <li><a href="complaints.html">Complaints</a></li>
        <li><a href="staff.html">Staff</a></li>
        <li><a href="inventory.html">Inventory</a></li>
        <li><a href="login.html">Logout</a></li>
    </ul>
</aside>

<main class="main">

<div class="topbar">
    <h1>Rooms</h1>
    <button id="openModalBtn">+ Add Room</button>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Search room...">
</div>

<div class="table-section">
<table>
<thead>
<tr>
<th>ID</th>
<th>Room</th>
<th>Capacity</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="roomTable"></tbody>
</table>
</div>

</main>
</div>

<!-- Modal -->
<div class="modal" id="modal">
<div class="modal-content">

<h2 id="modalTitle">Add Room</h2>

<input id="roomNo" placeholder="Room Number">
<input id="capacity" type="number" placeholder="Capacity">

<select id="status">
<option>Available</option>
<option>Occupied</option>
</select>

<div class="modal-buttons">
<button id="saveBtn">Save</button>
<button id="closeModalBtn">Cancel</button>
</div>

</div>
</div>

<script src="../js/admin_js/rooms.js"></script>
</body>
</html>
