<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin_css/login.css">
</head>
<body class="min-h-screen bg-slate-950 text-white">
    <div class="page-bg"></div>
    <div class="page-noise"></div>

    <main class="relative flex min-h-screen items-center justify-center overflow-hidden px-4 py-6 sm:px-6">
        <section id="loginCard" class="login-card w-full max-w-md rounded-3xl border border-white/10 px-6 py-8 shadow-2xl backdrop-blur-xl sm:px-8 sm:py-10">
            <div class="mb-8 text-center">
                <div class="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-2xl border border-cyan-400/20 bg-cyan-400/10 text-cyan-200">
                    <svg class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 10.5 12 4l9 6.5"></path>
                        <path d="M5 9.5V20h14V9.5"></path>
                        <path d="M9.5 20v-5a2.5 2.5 0 0 1 5 0v5"></path>
                    </svg>
                </div>
                <p class="mb-2 text-xs font-semibold uppercase tracking-[0.3em] text-cyan-200/80">Secure Access</p>
                <h1 class="text-3xl font-bold tracking-tight text-white">Admin Login</h1>
                <p class="mt-2 text-sm text-slate-300">Hostel Management System</p>
            </div>

            <form id="loginForm" class="space-y-5" novalidate>
                <div class="space-y-2">
                    <label for="email" class="block text-sm font-medium text-slate-200">Email Address</label>
                    <div class="input-shell relative">
                        <span class="field-icon absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                                <path d="m3 7 9 6 9-6"></path>
                            </svg>
                        </span>
                        <input id="email" name="email" type="email" autocomplete="email" class="w-full rounded-2xl border border-white/10 bg-white/5 px-12 py-3.5 text-sm text-white outline-none transition" />
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="password" class="block text-sm font-medium text-slate-200">Password</label>
                    <div class="input-shell relative">
                        <span class="field-icon absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <rect x="4" y="11" width="16" height="9" rx="2"></rect>
                                <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
                            </svg>
                        </span>
                        <input id="password" name="password" type="password" autocomplete="current-password" class="w-full rounded-2xl border border-white/10 bg-white/5 px-12 py-3.5 pr-14 text-sm text-white outline-none transition" />
                        <button id="togglePassword" type="button" class="absolute right-4 top-1/2 -translate-y-1/2 rounded-full p-1 text-slate-400 transition hover:text-white focus:outline-none" aria-label="Show password" aria-pressed="false">
                            <svg id="eyeOpen" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg id="eyeClosed" class="hidden h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="m3 3 18 18"></path>
                                <path d="M10.6 10.7a3 3 0 0 0 4.2 4.2"></path>
                                <path d="M9.4 5.2A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a17.6 17.6 0 0 1-4 4.9"></path>
                                <path d="M6.6 6.7C3.8 8.5 2 12 2 12a17.8 17.8 0 0 0 6.3 6"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between gap-4 text-sm">
                    <label class="flex cursor-pointer items-center gap-3 text-slate-300">
                        <input id="remember" type="checkbox" class="h-4 w-4 rounded border-white/20 bg-white/5 text-cyan-400 focus:ring-cyan-400/30">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="font-medium text-cyan-200 transition hover:text-white">Forgot Password?</a>
                </div>

                <button id="loginButton" type="submit" class="login-button flex w-full items-center justify-center gap-3 rounded-2xl px-5 py-3.5 text-sm font-semibold text-white transition focus:outline-none">
                    <span id="buttonText">Login</span>
                    <span id="buttonSpinner" class="spinner hidden h-5 w-5 rounded-full border-2"></span>
                </button>

                <p id="errorMsg" class="error-slot text-center text-sm font-medium text-rose-300" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="../js/admin_js/login.js"></script>
</body>
</html>
