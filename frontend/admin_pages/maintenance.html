<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>

<link rel="stylesheet" href="../css/admin_css/maintenance.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="hamburger" id="hamburger">☰</div>
<div class="overlay" id="overlay"></div>

<div class="dashboard">

<aside class="sidebar" id="sidebar">
    <h2>Hostel Admin</h2>

    <ul class="menu">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="students.html">Students</a></li>
        <li><a href="rooms.html">Rooms</a></li>
        <li><a href="allocations.html">Allocations</a></li>
        <li><a href="payments.html">Payments</a></li>
        <li><a href="complaints.html">Complaints</a></li>
        <li><a href="staff.html">Staff</a></li>

        <li class="active"><a href="maintenance.html">Maintenance</a></li>
        <li><a href="inventory.html">Inventory</a></li>
        <li><a href="meals.html">Meals</a></li>
        <li><a href="visitors.html">Visitors</a></li>

        <li><a href="login.html">Logout</a></li>
    </ul>
</aside>

<main class="main">

<div class="topbar">
    <h1>Maintenance Requests</h1>
    <button id="openModal">+ Add Request</button>
</div>

<div class="search-box">
    <input id="search" placeholder="Search maintenance...">
</div>

<div class="table-section">
<table>
<thead>
<tr>
<th>ID</th>
<th>Room</th>
<th>Issue</th>
<th>Date</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</main>
</div>

<!-- Modal -->
<div class="modal" id="modal">
<div class="modal-box">

<h2>Add Maintenance</h2>

<input id="room" placeholder="Room Number">
<textarea id="issue" placeholder="Describe issue..." rows="3"></textarea>

<select id="status">
<option value="Pending">Pending</option>
<option value="Completed">Completed</option>
</select>

<div class="modal-actions">
<button id="save">Save</button>
<button id="close">Cancel</button>
</div>

</div>
</div>

<script src="../js/admin_js/maintenance.js"></script>
</body>
</html>
